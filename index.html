<!DOCTYPE html>
<html>
<head>
  <title>Pastel Arena 3D Shooter</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
      color: #000;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      z-index: 10;
    }

    #overlay h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #00eaff;
      text-shadow: 0 0 10px #00eaff;
    }

    #overlay p {
      max-width: 550px;
      margin: 8px 0;
      line-height: 1.4;
    }

    #nextBtn {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 1.1rem;
      border: none;
      border-radius: 4px;
      background: linear-gradient(135deg, #ff00c8, #00eaff);
      cursor: pointer;
      color: black;
      box-shadow: 0 0 10px white;
    }

    #nextBtn:hover {
      filter: brightness(1.2);
    }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 5;
      font-size: 16px;
      text-shadow: 0 0 4px white;
      color: #000;
    }

    #bars {
      margin-top: 5px;
    }

    .bar-label {
      font-size: 12px;
    }

    .bar {
      width: 200px;
      height: 12px;
      background: #ccc;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 4px;
      border: 1px solid #555;
    }

    .bar-inner {
      height: 100%;
      width: 100%;
    }

    #healthInner {
      background: linear-gradient(90deg, #ff5555, #ff0000);
    }

    #shieldInner {
      background: linear-gradient(90deg, #55aaff, #0077ff);
    }

    #weaponInfo {
      margin-top: 6px;
      font-size: 14px;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 30px;
      color: #00aaee;
      text-shadow: 0 0 10px #00aaee;
      pointer-events: none;
      user-select: none;
      z-index: 5;
      display: none;
    }
    #nextBtn {
  position: relative;
  z-index: 9999;
}

  </style>
</head>
<body>

<div id="overlay">
  <h1>PASTEL ARENA 3D SHOOTER</h1>
  <p><b>W / A / S / D</b> – Walk</p>
  <p><b>Space</b> – Jump</p>
  <p><b>Mouse</b> – Look around</p>
  <p><b>Left Click</b> – Shoot</p>
  <p><b>1–4</b> – Switch weapons</p>
  <button id="nextBtn">Next / Start</button>
</div>

<div id="hud">
  <div id="score">Score: 0</div>
  <div id="bars">
    <div class="bar-label">Health</div>
    <div class="bar"><div id="healthInner" class="bar-inner"></div></div>
    <div class="bar-label">Shield</div>
    <div class="bar"><div id="shieldInner" class="bar-inner"></div></div>
  </div>
  <div id="weaponInfo"></div>
</div>

<div id="crosshair">+</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
/* ---------------------------
   BASE VARIABLES
----------------------------*/

let scene, camera, renderer;
let keys = {};
let enemies = [];
let effects = [];
let solids = []; // REAL collision objects
let score = 0;
let started = false;
let gameOver = false;
let health = 100;
let shield = 100;
let currentLevel = 1;
let enemiesSpawned = 0;
let enemiesToSpawn = 20;
let enemiesKilled = 0;
let spawnCooldown = 0;
let inBossFight = false;

const overlay = document.getElementById("overlay");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");
const healthInner = document.getElementById("healthInner");
const shieldInner = document.getElementById("shieldInner");
const weaponInfo = document.getElementById("weaponInfo");
const crosshair = document.getElementById("crosshair");
// CLICK HANDLER FOR NEXT / START BUTTON
nextBtn.addEventListener("click", () => {
  overlay.style.display = "none";
  started = true;
});


let currentWeapon = 1;
const weaponNames = {
  1: "Rapid Blaster",
  2: "Shotgun",
  3: "Laser Beam",
  4: "Rocket Launcher"
};

let weaponUnlocked = {
  1: true,
  2: false,
  3: false,
  4: false
};


function updateWeaponInfo() {
  weaponInfo.textContent = "Weapon: " + currentWeapon + " – " + weaponNames[currentWeapon];
}
updateWeaponInfo();

nextBtn.onclick = () => {
  overlay.style.display = "none";
  started = true;
};

document.addEventListener("keydown", e => {
  keys[e.key] = true;
 if (e.key >= "1" && e.key <= "4") {
  const num = parseInt(e.key);
  if (weaponUnlocked[num]) {
    currentWeapon = num;
    updateWeaponInfo();
  }
}


document.addEventListener("keyup", e => keys[e.key] = false);

/* ---------------------------
   INIT
----------------------------*/

function init() {
  scene = new THREE.Scene();

  const hemi = new THREE.HemisphereLight(0x87ceeb, 0xb0e0a8, 1.0);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xffffff, 1.3);
sun.position.set(40, 80, 20);
sun.castShadow = true;
scene.add(sun);

const cloudGeo = new THREE.PlaneGeometry(50, 20);
const cloudMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.5
});

for (let i = 0; i < 5; i++) {
    const cloud = new THREE.Mesh(cloudGeo, cloudMat);
    cloud.position.set(
        (Math.random() - 0.5) * 80,
        40 + Math.random() * 10,
        (Math.random() - 0.5) * 80
    );
    cloud.rotation.x = -Math.PI / 2;
    scene.add(cloud);
}

 camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.rotation.order = "YXZ"; // important for FPS

// Create a simple gun head
const gunGeo = new THREE.BoxGeometry(0.4, 0.4, 1);
const gunMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
gunMesh = new THREE.Mesh(gunGeo, gunMat);

// Attach gun to camera
camera.add(gunMesh);
scene.add(camera);

// Position gun in view
gunMesh.position.set(0.5, -0.4, -1.2);

camera.rotation.order = "YXZ"; // IMPORTANT


  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x87ceeb); // sky blue
  scene.background = new THREE.Color(0x87ceeb);

  document.body.appendChild(renderer.domElement);

  buildArena();

  camera.position.set(0, 2, 20);

  renderer.domElement.addEventListener("click", () => {
    if (started) {
      renderer.domElement.requestPointerLock();
      crosshair.style.display = "block";
    }
  });

document.addEventListener("mousemove", e => {
  if (document.pointerLockElement === renderer.domElement) {

    // Horizontal rotation (yaw)
    camera.rotation.y -= e.movementX * 0.002;

    // Vertical rotation (pitch)
    camera.rotation.x -= e.movementY * 0.002;

    // Clamp pitch
    const maxPitch = Math.PI / 2 - 0.1;
    camera.rotation.x = Math.max(-maxPitch, Math.min(maxPitch, camera.rotation.x));

    // Force no roll
    camera.rotation.z = 0;
  }
});



  document.addEventListener("keydown", e => {
    if (e.key === " " && onGround) {
      velocityY = 0.25;
      onGround = false;
    }
  });

  window.addEventListener("resize", onResize);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

/* ---------------------------
   BUILD ARENA (WITH SOLIDS)
----------------------------*/

function addSolid(mesh) {
  mesh.geometry.computeBoundingBox();
  solids.push(mesh);
}

function buildArena() {
  // Floor
  const floorGeo = new THREE.BoxGeometry(100, 1, 70);
  const floorMat = new THREE.MeshLambertMaterial({ color: 0xb8f5c0 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.position.set(0, -0.5, 0);
  scene.add(floor);
  addSolid(floor);

  // Borders
  const borderMat = new THREE.MeshLambertMaterial({ color: 0xffffff });

  const longGeo = new THREE.BoxGeometry(100, 3, 1);
  const shortGeo = new THREE.BoxGeometry(1, 3, 70);

  const front = new THREE.Mesh(longGeo, borderMat);
  front.position.set(0, 1, -35);
  scene.add(front);
  addSolid(front);

  const back = front.clone();
  back.position.set(0, 1, 35);
  scene.add(back);
  addSolid(back);

  const left = new THREE.Mesh(shortGeo, borderMat);
  left.position.set(-50, 1, 0);
  scene.add(left);
  addSolid(left);

  const right = left.clone();
  right.position.set(50, 1, 0);
  scene.add(right);
  addSolid(right);

  // Floating pink platform
  const platGeo = new THREE.BoxGeometry(20, 1, 12);
  const pinkMat = new THREE.MeshLambertMaterial({ color: 0xffc0cb });
  const pinkPlat = new THREE.Mesh(platGeo, pinkMat);
  pinkPlat.position.set(-25, 6, 0);
  scene.add(pinkPlat);
  addSolid(pinkPlat);

  // Supported blue platform
  const blueMat = new THREE.MeshLambertMaterial({ color: 0xadd8ff });
  const bluePlat = new THREE.Mesh(platGeo, blueMat);
  bluePlat.position.set(25, 4, 0);
  scene.add(bluePlat);
  addSolid(bluePlat);

  // Legs
  const legGeo = new THREE.BoxGeometry(1, 4, 1);
  const legMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const offsets = [
    [-9, -5],
    [9, -5],
    [-9, 5],
    [9, 5]
  ];
  offsets.forEach(o => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(25 + o[0], 2, 0 + o[1]);
    scene.add(leg);
    addSolid(leg);
  });

  // Ramps
  const rampMat = new THREE.MeshLambertMaterial({ color: 0xfff3a3 });
  const rampGeo = new THREE.BoxGeometry(20, 1, 6);

  const rampPink = new THREE.Mesh(rampGeo, rampMat);
  rampPink.position.set(-15, 3.5, -10);
  rampPink.rotation.z = -Math.PI / 10;
  rampPink.rotation.x = -Math.PI / 12;
  scene.add(rampPink);
  addSolid(rampPink);

  const rampBlue = new THREE.Mesh(rampGeo, rampMat);
  rampBlue.position.set(15, 2.5, 10);
  rampBlue.rotation.z = Math.PI / 10;
  rampBlue.rotation.x = Math.PI / 12;
  scene.add(rampBlue);
  addSolid(rampBlue);

  // Pillars
  const pillarGeo = new THREE.BoxGeometry(2, 5, 2);
  const pillarMat = new THREE.MeshLambertMaterial({ color: 0xd8b0ff });
  const pillarPositions = [
    [-30, 2.5, -20],
    [-30, 2.5, 20],
    [0, 2.5, -25],
    [0, 2.5, 25],
    [30, 2.5, -15],
    [30, 2.5, 15]
  ];
  pillarPositions.forEach(p => {
    const pil = new THREE.Mesh(pillarGeo, pillarMat);
    pil.position.set(p[0], p[1], p[2]);
    scene.add(pil);
    addSolid(pil);
  });
}

/* ---------------------------
   PLAYER MOVEMENT + COLLISION
----------------------------*/

let playerHeight = 1.7;
let velocityY = 0;
let gravity = -0.015;
let onGround = false;

function updatePlayer() {
  const speed = 0.25;

// Use yaw only for movement (Roblox-style)
const yaw = new THREE.Euler(0, camera.rotation.y, 0, "YXZ");

const forward = new THREE.Vector3(0, 0, -1).applyEuler(yaw);
const right = new THREE.Vector3(1, 0, 0).applyEuler(yaw);

  if (keys["w"] || keys["W"]) camera.position.addScaledVector(forward, speed);
  if (keys["s"] || keys["S"]) camera.position.addScaledVector(forward, -speed);
  if (keys["a"] || keys["A"]) camera.position.addScaledVector(right, -speed);
  if (keys["d"] || keys["D"]) camera.position.addScaledVector(right, speed);

  velocityY += gravity;
  camera.position.y += velocityY;

  applyCollision();

  camera.position.x = Math.max(-48, Math.min(48, camera.position.x));
  camera.position.z = Math.max(-33, Math.min(33, camera.position.z));
}

/* ---------------------------
   COLLISION USING BOUNDING BOXES
----------------------------*/

const groundRay = new THREE.Raycaster();
const downVec = new THREE.Vector3(0, -1, 0);

function applyCollision() {
  const origin = camera.position.clone();
  origin.y += 2; // cast from above player

  groundRay.set(origin, downVec);

  const hits = groundRay.intersectObjects(solids, false);

  if (hits.length === 0) {
    onGround = false;
    return;
  }

  let groundY = -Infinity;

  hits.forEach(hit => {
    if (hit.point.y > groundY && hit.point.y <= camera.position.y) {
      groundY = hit.point.y;
    }
  });

  if (groundY === -Infinity) {
    onGround = false;
    return;
  }

  const targetY = groundY + playerHeight;

  if (camera.position.y < targetY) {
    camera.position.y = targetY;
    velocityY = 0;
    onGround = true;
  } else {
    onGround = false;
  }
}

/* ---------------------------
   WEAPONS + AIM
----------------------------*/

const raycaster = new THREE.Raycaster();
const rayDir = new THREE.Vector3();

document.addEventListener("mousedown", e => {
  if (e.button === 0 && started && !gameOver) {
    fireWeapon();
  }
});

function fireWeapon() {
  rayDir.set(0, 0, -1);
  rayDir.applyEuler(camera.rotation);
  raycaster.set(camera.position.clone(), rayDir.clone().normalize());

  const enemyMeshes = enemies.map(e => e.mesh);
  const hits = raycaster.intersectObjects(enemyMeshes, false);
  const primaryHit = hits.length > 0 ? hits[0] : null;

  if (currentWeapon === 1) {
    if (primaryHit) {
      applyDamageToEnemy(primaryHit.object.userData, 1);
      spawnHitFlash(primaryHit.point, 0x00aaff);
    }
  }
if (score >= 10) weaponUnlocked[2] = true; // shotgun
if (score >= 25) weaponUnlocked[3] = true; // laser
if (score >= 50) weaponUnlocked[4] = true; // rocket


  else if (currentWeapon === 2) {
    for (let i = 0; i < 6; i++) {
      const spreadX = (Math.random() - 0.5) * 0.06;
      const spreadY = (Math.random() - 0.5) * 0.06;

      const dir = new THREE.Vector3(0, 0, -1);
      dir.applyEuler(camera.rotation);
      dir.x += spreadX;
      dir.y += spreadY;
      dir.normalize();

      raycaster.set(camera.position.clone(), dir);
      const hits2 = raycaster.intersectObjects(enemyMeshes, false);

      if (hits2.length > 0) {
        applyDamageToEnemy(hits2[0].object.userData, 1);
        spawnHitFlash(hits2[0].point, 0xffaa00);
      }
    }
  }

  else if (currentWeapon === 3) {
    if (primaryHit) {
      applyDamageToEnemy(primaryHit.object.userData, 3);
      spawnLaserBeam(primaryHit.point);
    }
  }

  else if (currentWeapon === 4) {
    if (primaryHit) {
      spawnExplosion(primaryHit.point);

      enemies.forEach(e => {
        const d = e.mesh.position.distanceTo(primaryHit.point);
        if (d < 7) {
          applyDamageToEnemy(e, 3);
        }
      });
    }
  }
}

/* ---------------------------
   ENEMY DAMAGE + EFFECTS
----------------------------*/

function applyDamageToEnemy(enemyObj, amount) {
  enemyObj.health -= amount;

  if (enemyObj.health <= 0) {
    score++;
    scoreEl.textContent = "Score: " + score;

    spawnExplosion(enemyObj.mesh.position);
    scene.remove(enemyObj.mesh);

    enemies = enemies.filter(e => e !== enemyObj);
      enemies = enemies.filter(e => e !== enemyObj);

    // TRACK KILLS FOR LEVEL SYSTEM
    enemiesKilled++;

    // LEVEL PROGRESSION
    if (!inBossFight && enemiesKilled >= enemiesToSpawn && enemies.length === 0) {
        currentLevel++;

        if (currentLevel <= 5) {
            // Next level
            enemiesSpawned = 0;
            enemiesKilled = 0;
            enemiesToSpawn = Math.min(20 + currentLevel * 15, 100);

        } else {
            // Boss time
            startBossFight();
        }
    }
}



function spawnHitFlash(position, color) {
  const geo = new THREE.SphereGeometry(0.2, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
  const flash = new THREE.Mesh(geo, mat);

  flash.position.copy(position);
  flash.userData = { life: 0, type: "flash" };

  effects.push(flash);
  scene.add(flash);
}

function startBossFight() {
  inBossFight = true;

  const geo = new THREE.BoxGeometry(3, 3, 3);
  const mat = new THREE.MeshLambertMaterial({ color: 0x880000 });
  const mesh = new THREE.Mesh(geo, mat);

  mesh.position.set(0, 2, -30);

  const boss = {
    mesh,
    speed: 0.03,
    health: 200,
    maxHealth: 200,
    isBoss: true
  };

  mesh.userData = boss;
  enemies.push(boss);
  scene.add(mesh);

  alert("Boss incoming!");
}


function spawnLaserBeam(hitPoint) {
  const start = camera.position.clone();
  const end = hitPoint.clone();
  const dir = new THREE.Vector3().subVectors(end, start);
  const length = dir.length();

  const geo = new THREE.CylinderGeometry(0.05, 0.05, length, 8);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
  const beam = new THREE.Mesh(geo, mat);

  beam.position.copy(start).addScaledVector(dir.normalize(), length / 2);
  beam.lookAt(end);
  beam.rotateX(Math.PI / 2);

  beam.userData = { life: 0, type: "beam" };
  effects.push(beam);
  scene.add(beam);
}

function spawnExplosion(position) {
  const geo = new THREE.SphereGeometry(0.8, 16, 16);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffaa33, transparent: true, opacity: 0.9 });
  const explosion = new THREE.Mesh(geo, mat);

  explosion.position.copy(position);
  explosion.userData = { life: 0, type: "explosion" };

  effects.push(explosion);
  scene.add(explosion);
}

function updateEffects(delta) {
  effects.forEach((ex, i) => {
    ex.userData.life += delta;

    if (ex.userData.type === "explosion") {
      ex.scale.addScalar(0.05 * delta);
      ex.material.opacity -= 0.02 * delta;

      if (ex.material.opacity <= 0) {
        scene.remove(ex);
        effects.splice(i, 1);
      }
    }

    else if (ex.userData.type === "flash") {
      ex.material.opacity -= 0.05 * delta;

      if (ex.material.opacity <= 0) {
        scene.remove(ex);
        effects.splice(i, 1);
      }
    }

    else if (ex.userData.type === "beam") {
      if (ex.userData.life > 10) {
        scene.remove(ex);
        effects.splice(i, 1);
      }
    }
  });
}

/* ---------------------------
   ENEMIES
----------------------------*/

function spawnEnemy() {
  const geo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
  const mat = new THREE.MeshLambertMaterial({ color: 0xff7777 });
  const mesh = new THREE.Mesh(geo, mat);

  const angle = Math.random() * Math.PI * 2;
  const radius = 45;
  const zRange = 30;

  mesh.position.set(
    Math.cos(angle) * radius,
    1,
    (Math.random() - 0.5) * zRange
  );

  const enemy = {
    mesh,
    speed: 0.05 + Math.random() * 0.04,
    health: 5
  };

  mesh.userData = enemy;
  enemies.push(enemy);
  scene.add(mesh);
}


/* ---------------------------
   PLAYER DAMAGE
----------------------------*/

function applyPlayerDamage(amount) {
  if (shield > 0) {
    const used = Math.min(shield, amount);
    shield -= used;
    amount -= used;
  }

  if (amount > 0) {
    health -= amount;
  }

  if (health <= 0 && !gameOver) {
    health = 0;
    gameOver = true;
    alert("GAME OVER! Score: " + score);
    location.reload();
  }

  updateBars();
}

function updateBars() {
  healthInner.style.width = health + "%";
  shieldInner.style.width = shield + "%";
}

/* ---------------------------
   ENEMY MOVEMENT
----------------------------*/

function updateEnemies(delta) {
  enemies.forEach(enemy => {
    const e = enemy.mesh;
    const dir = camera.position.clone().sub(e.position).normalize();

    e.position.addScaledVector(dir, enemy.speed * delta);

    const dist = e.position.distanceTo(camera.position);
    if (dist < 1.5 && !gameOver) {
      applyPlayerDamage(10);
      e.position.addScaledVector(dir.negate(), 3);
    }
  });
}

/* ---------------------------
   GAME LOOP
----------------------------*/

let lastTime = 0;

function animate(time) {
  requestAnimationFrame(animate);

  const delta = (time - lastTime) / 16.67;
  lastTime = time;

  if (started && !gameOver) {
    // Level-based spawning
if (!inBossFight) {
  spawnCooldown -= delta;
  if (spawnCooldown <= 0 && enemiesSpawned < enemiesToSpawn) {
    const extraHP = (currentLevel - 1) * 2;
    spawnEnemy(5 + extraHP);
    enemiesSpawned++;
    spawnCooldown = 20 / enemiesToSpawn;
  }
}

    updatePlayer();
    updateEnemies(delta);
    updateEffects(delta);
  }

  renderer.render(scene, camera);
}

init();
animate();
</script>
</body>
</html>
