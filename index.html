<!DOCTYPE html>
<html>
<head>
  <title>Working Cutscene</title>
  <style>
    body { margin:0; overflow:hidden; }
    #overlay {
      position:fixed;
      inset:0;
      background:black;
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:10;
    }
    button {
      padding:12px 25px;
      font-size:18px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1 id="status">Loading...</h1>
  <button id="startBtn" disabled>Play</button>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,10);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

let clock = new THREE.Clock();
let mixer, character;
let started = false;
let time = 0;

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// GROUND
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x88cc88})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// LOAD MODEL
const loader = new GLTFLoader();
loader.load(
  "https://threejs.org/examples/models/gltf/Soldier.glb",
  (gltf) => {
    character = gltf.scene;
    character.scale.set(1.5,1.5,1.5);
    scene.add(character);

    mixer = new THREE.AnimationMixer(character);
    mixer.clipAction(gltf.animations[0]).play();

    document.getElementById("status").textContent = "Ready";
    document.getElementById("startBtn").disabled = false;
  },
  undefined,
  (err) => {
    document.getElementById("status").textContent = "Failed to load model";
    console.error(err);
  }
);

// BUTTON
document.getElementById("startBtn").onclick = () => {
  document.getElementById("overlay").style.display = "none";
  started = true;
};

// LOOP
function animate() {
  requestAnimationFrame(animate);

  let delta = clock.getDelta();
  if (mixer) mixer.update(delta);

  if (started) {
    time += 0.02;

    camera.position.x = Math.sin(time) * 6;
    camera.position.z = Math.cos(time) * 6;
    camera.lookAt(0,1,0);
  }

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
